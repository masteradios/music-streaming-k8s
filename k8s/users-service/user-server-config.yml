apiVersion: v1
kind: ConfigMap
metadata:
  name: user-server-config
  labels:
    app: user-server
data:
  KAFKA_HOST: kafka-service
  KAFKA_PORT: "29092"
  ELASTICSEARCH_HOST: elasticsearch-service
  ELASTICSEARCH_PORT: "9200"  
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: "5432"
  POSTGRES_DB_NAME: musicdb
  POSTGRES_USERNAME: postgres
  POSTGRES_PASS: postgres